    output_frame: "torso_link"
    tf_lookup_timeout_s: 0.2

    goal_pose_topic: "/goal_pose"
    tag_pose_topic: "/apriltag/tag_pose"
    target_pose_topic: "/apriltag/target_pose"
    joint_trajectory_topic: "/joint_trajectory_targets"
    reach_max_distance: 0.55
    trigger_key: "g"
    detect_only: false
    fixed_orientation_enabled: false
    fixed_rpy: [-0.0873, -0.0340, 0.0199]

    save_debug_images: true
    debug_image_dir: "/home/unitree/Desktop/unitree_dex3/detect_img"
