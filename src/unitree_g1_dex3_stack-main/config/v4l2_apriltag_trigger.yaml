v4l2_apriltag_trigger:
  ros__parameters:
    camera_id: "d435i_front"
    expected_serial: "253243060636"
    video_device: "auto"
    expected_usb_interface_num: "03"
    image_width: 640
    image_height: 480
    fps: 6.0
    fourcc: "YUYV"
    sample_count: 4
    warmup_frames: 12
